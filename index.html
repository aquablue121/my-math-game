<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이차함수 마스터: 전설의 용사</title>
    <style>
        body { background: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        /* ── 모바일 스케일링 ── */
        #game-container {
            width: 1000px;
            height: 750px;
            position: relative;
            border: 4px solid #3d2e23;
            overflow: hidden;
            background: #000;
            transform-origin: top center;
            /* JS에서 동적으로 scale 설정 */
        }

        #bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center top; z-index: 0; }
        .char-box { position: absolute; width: 240px; height: 270px; z-index: 10; background-size: contain; background-repeat: no-repeat; background-position: center bottom; transition: 0.3s; }
        #knight { left: 80px; bottom: 160px; background-image: url('k_solo.jpg'); }
        #target { right: 80px; bottom: 160px; background-image: url('a_solo.jpg'); }

        .fullscreen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 500; display: none; }
        #overlay-msg { position: absolute; width: 90%; left:5%; text-align: center; top: 50%; transform: translateY(-50%); font-size: 40px; font-weight: bold; color: #fff; text-shadow: 4px 4px 15px #000, 0 0 30px rgba(0,0,0,0.9); z-index: 510; pointer-events: none; white-space: pre-line; background: rgba(0,0,0,0.5); border-radius: 16px; padding: 18px; box-sizing: border-box; }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        #grid-layer { z-index: 20; }
        #graph-layer { z-index: 21; }

        .grid-dot { position: absolute; width: 22px; height: 22px; background: rgba(255,255,100,0.45); border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%,-50%); cursor: pointer; z-index: 60; box-shadow: 0 0 6px rgba(255,255,100,0.6); transition: background 0.15s, transform 0.1s; }
        .grid-dot:hover { background: rgba(255,255,0,0.75); transform: translate(-50%,-50%) scale(1.3); }

        /* TOP UI */
        #top-ui { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; z-index: 100; }
        .status-box { background: rgba(0,0,0,0.9); border: 2px solid #f1c40f; padding: 10px 14px; border-radius: 8px; width: 210px; }
        .hp-bar { width: 100%; height: 16px; background: #222; margin-top: 5px; border: 1px solid #fff; border-radius: 8px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: 0.4s; background: linear-gradient(to right, #2ecc71, #27ae60); }

        /* BOTTOM PANEL */
        #bottom-panel { position: absolute; bottom: 0; width: 100%; background: rgba(25,20,15,0.97); border-top: 4px solid #5d4a3e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 8px 10px 10px; box-sizing: border-box; height: 160px; }
        #quiz-box { font-size: 18px; color: #f1c40f; font-weight: bold; text-align: center; margin-bottom: 6px; line-height: 1.4; white-space: pre-line; }
        #control-area button { padding: 8px 22px; font-size: 17px; cursor: pointer; border-radius: 10px; margin: 0 6px; font-weight: bold; border: 2px solid #f1c40f; background: #2c3e50; color: white; }
        #control-area button:hover { background: #3d5166; }

        #small-msg { position: absolute; top: 145px; width: 100%; text-align: center; font-size: 21px; font-weight: bold; text-shadow: 2px 2px 10px #000; z-index: 300; pointer-events: none; display: none; background: rgba(0,0,0,0.78); padding: 8px 0; }

        /* ===== QUEST 3: 비밀의 숲 — 4분할 grid =====
           헤더(36px) + 아래를 2×2 grid
           [좌상: 지시문] [우상: 그래프]
           [좌하: 버튼]   [우하: 수식]
        ===== */
        #q3-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            display:none; z-index:180;
            background:url('m_secret1.png') center top/cover no-repeat;
        }
        /* 루트: 헤더 36px + 나머지 */
        #q3-bottom {
            position:absolute; top:0; left:0; width:100%; height:100%;
            z-index:190; box-sizing:border-box;
            display:flex; flex-direction:column;
            overflow:hidden;
        }
        /* 헤더 (48px 고정) — 제목이 그리드보다 반드시 위에 */
        #q3-header-row {
            flex:0 0 48px; min-height:48px; max-height:48px;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 18px; box-sizing:border-box;
            background:rgba(8,4,22,1);
            border-bottom:2px solid #7b2d8b;
            position:relative; z-index:5;
        }
        #q3-prog-label  { font-size:14px; color:#9b59b6; font-weight:bold; }
        #q3-quest-title { font-size:15px; color:#c39bd3; font-weight:bold; }

        /* 2×2 grid — 헤더(48px) 아래 나머지 전부 */
        #q3-grid {
            flex:1; min-height:0;
            display:grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap:0;
            overflow:hidden;
        }

        /* 각 칸: overflow:hidden 으로 내용 절대 침범 불가 */
        .q3-cell {
            overflow:hidden;
            box-sizing:border-box;
        }

        /* 좌상(A): 그래프 캔버스 — grid 내부이므로 헤더 아래에서 시작 */
        #q3-cell-A {
            grid-column:1; grid-row:1;
            background:rgba(6,2,18,1);
            border-right:2px solid rgba(123,45,139,0.6);
            border-bottom:2px solid rgba(123,45,139,0.6);
            display:flex; align-items:center; justify-content:center;
            padding:6px 8px;
            overflow:hidden;
        }

        /* 우상(B): 지시문 */
        #q3-cell-B {
            grid-column:2; grid-row:1;
            background:rgba(10,5,28,1);
            border-bottom:2px solid rgba(123,45,139,0.6);
            display:flex; align-items:center; justify-content:center;
            padding:16px 20px;
        }
        #q3-quiz-text {
            font-size:17px; color:#f1c40f; font-weight:bold;
            text-align:center; line-height:1.7; white-space:pre-line;
            width:100%;
        }
        #q3-canvas {
            display:block;
            border:2px solid rgba(123,45,139,0.7);
            border-radius:8px; background:rgba(10,5,25,1);
            /* 칸 크기에 꽉 맞게: 최대 칸 너비/높이를 넘지 않음 */
            max-width:100%; max-height:100%;
            object-fit:contain;
        }

        /* 좌하(C): ㄱㄴㄷㄹ 버튼 */
        #q3-cell-C {
            grid-column:1; grid-row:2;
            background:rgba(8,4,20,1);
            border-right:2px solid rgba(123,45,139,0.6);
            display:flex; align-items:center; justify-content:center;
            padding:12px;
            gap:0;
        }
        #q3-order-btns     { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:center; }
        #q3-graph-lbl-btns { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:center; }

        /* 우하(D): 수식 목록 + 힌트 + 제출 */
        #q3-cell-D {
            grid-column:2; grid-row:2;
            background:rgba(8,4,22,1);
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:10px 16px; gap:8px;
        }
        #q3-order-guide { color:#c39bd3; font-size:15px; text-align:center; line-height:1.7; }
        #q3-formula-list {
            display:flex; flex-direction:column; gap:7px;
            width:100%; overflow-y:auto; max-height:100%;
        }
        .q3fi {
            background:rgba(28,10,54,0.95); border:2px solid #7b2d8b;
            border-radius:9px; padding:9px 13px; font-size:15px;
            color:#f1c40f; font-weight:bold; cursor:pointer;
            transition:border-color 0.15s;
            display:flex; align-items:center; justify-content:space-between;
            flex-shrink:0;
        }
        .q3fi:hover        { border-color:#f1c40f; }
        .q3fi.q3fi-active  { border-color:#fff; background:rgba(50,20,80,0.95); }
        .q3fi.q3fi-matched { border-color:#2ecc71; }
        .q3fi-arrow { font-size:12px; color:#888; min-width:68px; text-align:right; white-space:nowrap; }
        #q3-hint-msg {
            font-size:14px; color:#f39c12; font-weight:bold;
            text-align:center; white-space:pre-line; line-height:1.5;
        }
        #q3-submit-btn {
            padding:9px 34px; font-size:15px; cursor:pointer; border-radius:10px;
            font-weight:bold; border:2px solid #c39bd3; background:#3d1a5e; color:white;
            flex-shrink:0;
        }
        #q3-submit-btn:hover { background:#6c3483; }

        /* ===== 오프닝 씬 ===== */
        #opening-screen {
            position:absolute; top:0; left:0; width:100%; height:100%;
            z-index:900; display:none; flex-direction:column;
            align-items:center; justify-content:flex-end;
            background:#000;
        }
        #opening-img {
            position:absolute; top:0; left:0; width:100%; height:100%;
            object-fit:cover;
        }
        #opening-msg {
            position:relative; z-index:910; width:90%; text-align:center;
            font-size:21px; font-weight:bold; color:#fff;
            text-shadow:2px 2px 10px #000, 0 0 20px rgba(0,0,0,0.95);
            background:rgba(0,0,0,0.68); border-radius:12px;
            padding:14px 22px; margin-bottom:30px; line-height:1.7; white-space:pre-line;
        }

        /* ===== 피드백 ===== */
        #feedback-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(160deg,#0a0a1a,#1a0a2e 50%,#0a1a0a); z-index: 700; display: none; overflow-y: auto; box-sizing: border-box; padding: 18px 26px; }
        #feedback-screen::-webkit-scrollbar { width: 5px; }
        #feedback-screen::-webkit-scrollbar-thumb { background: #9b59b6; border-radius: 3px; }
        .fb-title { font-size: 24px; font-weight: bold; color: #f1c40f; text-align: center; margin-bottom: 16px; text-shadow: 0 0 18px #f39c12; letter-spacing: 2px; }
        .fb-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; }
        .fb-section-title { font-size: 15px; font-weight: bold; margin-bottom: 8px; }
        .fb-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; font-size: 13px; }
        .fb-bar-bg { flex: 1; height: 12px; background: #222; border-radius: 6px; overflow: hidden; }
        .fb-bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease; }
        .fb-tag { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 12px; font-weight: bold; margin: 2px 3px; }
        .fb-good { background: #1a4a2a; color: #2ecc71; border: 1px solid #2ecc71; }
        .fb-comment { font-size: 15px; color: #e8e8e8; line-height: 1.8; padding: 3px 0; }
        #fb-restart-btn { display: block; width: 200px; margin: 14px auto 0; padding: 11px 0; font-size: 17px; font-weight: bold; cursor: pointer; border-radius: 10px; background: linear-gradient(135deg,#1a3a6a,#2980b9); border: 2px solid #5dade2; color: #fff; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="bg-layer"></div>
    <div id="knight" class="char-box"></div>
    <div id="target" class="char-box"></div>

    <div id="full-overlay" class="fullscreen-overlay"></div>
    <div id="overlay-msg"></div>
    <div id="small-msg"></div>

    <canvas id="grid-layer" width="1000" height="750"></canvas>
    <canvas id="graph-layer" width="1000" height="750"></canvas>
    <canvas id="q3ov-layer" width="1000" height="750" style="position:absolute;top:0;left:0;z-index:22;pointer-events:none;display:none;"></canvas>

    <!-- 오프닝 씬 -->
    <div id="opening-screen">
        <img id="opening-img" src="" alt="">
        <div id="opening-msg"></div>
    </div>

    <!-- QUEST 3 오버레이 — 4분할 grid -->
    <div id="q3-overlay">
        <div id="q3-bottom">

            <!-- 헤더 -->
            <div id="q3-header-row">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div id="q3-prog-label"></div>
                    <div id="q3-prog-dots" style="display:flex;gap:5px;align-items:center;"></div>
                </div>
                <div id="q3-quest-title">🌲 QUEST 3: 비밀의 숲 그래프 퀴즈</div>
                <div style="display:flex;align-items:center;gap:8px;min-width:160px;">
                    <span style="font-size:12px;color:#9b59b6;font-weight:bold;">HP</span>
                    <div style="flex:1;height:14px;background:#222;border:1px solid #7b2d8b;border-radius:7px;overflow:hidden;min-width:100px;">
                        <div id="q3-hp-fill" style="height:100%;background:linear-gradient(to right,#2ecc71,#27ae60);transition:width 0.4s;width:100%;"></div>
                    </div>
                    <span id="q3-hp-num" style="font-size:12px;color:#2ecc71;font-weight:bold;min-width:32px;">100</span>
                </div>
            </div>

            <!-- 2×2 grid -->
            <div id="q3-grid">

                <!-- 좌상(A): 그래프 캔버스 -->
                <div id="q3-cell-A" class="q3-cell">
                    <canvas id="q3-canvas" width="440" height="300"></canvas>
                </div>

                <!-- 우상(B): 지시문 -->
                <div id="q3-cell-B" class="q3-cell">
                    <div id="q3-quiz-text"></div>
                </div>

                <!-- 좌하(C): ㄱㄴㄷㄹ / A B C D 버튼 -->
                <div id="q3-cell-C" class="q3-cell">
                    <div id="q3-order-btns"     style="display:none;"></div>
                    <div id="q3-graph-lbl-btns" style="display:none;"></div>
                    <div id="q3-order-guide"    style="display:none;color:#aaa;font-size:14px;text-align:center;">
                        오른쪽 그래프를 보고<br>a값 큰 순서대로 버튼을 클릭하세요.
                    </div>
                </div>

                <!-- 우하(D): 수식 목록 + 힌트 + 제출 -->
                <div id="q3-cell-D" class="q3-cell">
                    <div id="q3-formula-list" style="display:none;"></div>
                    <div id="q3-hint-msg"></div>
                    <button id="q3-submit-btn" onclick="submitQ3Ov()">제출</button>
                </div>

            </div>
        </div>
    </div>

    <!-- 피드백 -->
    <div id="feedback-screen">
        <div class="fb-title">📊 학습 결과 분석</div>
        <div id="fb-content"></div>
        <button id="fb-restart-btn" onclick="restartFromQ1()">🔄 처음부터 다시!</button>
    </div>

    <div id="top-ui">
        <div class="status-box">
            <div id="lv-text" style="color:#f1c40f;font-weight:bold;">LV.1 용사</div>
            <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div></div>
        </div>
        <div style="text-align:center;">
            <div id="q-title" style="font-size:17px;color:#fff;">QUEST</div>
            <div id="q-prog" style="color:#f1c40f;font-size:22px;font-weight:bold;">1/10</div>
        </div>
        <div class="status-box" style="visibility:hidden;"></div>
    </div>
    <div id="bottom-panel">
        <div id="quiz-box"></div>
        <div id="control-area"></div>
    </div>
</div>

<script>
/* ================================================================
   전역 상태
================================================================ */
const CX=500,CY=350,UNIT=60;
let pHP=100,currentLevel=1,currentQuest=1,qCount=1;
let isPerfect=true,currentFunc=null,selectedDots=0,wrongInStage=0,correctCount=0;

const gd={
    q1:{c:0,w:0},
    q2:{c:0,w:0},
    q3:{c:0,w:0},  // 구 Q2.5
};

/* ================================================================
   QUEST 1: 이차함수 판별 (10문제, 70%+마지막)
================================================================ */
const q1Pool=[
    {f:"y = x² + 2x + 1",isQ:true},{f:"y = 3x²",isQ:true},
    {f:"y = x(x - 3)",isQ:true},{f:"y = -2x² + 5",isQ:true},
    {f:"y = (x-1)² + 4",isQ:true},{f:"y = 2x² - 3x + 1",isQ:true},
    {f:"y = -(x+2)²",isQ:true},{f:"y = x² - 9",isQ:true},
    {f:"y = (2x+1)(x-3)",isQ:true},{f:"y = 4x² + x",isQ:true},
    {f:"y = -3x² + 2x",isQ:true},{f:"y = (x-4)(x+2)",isQ:true},
    {f:"y = 5x² - x + 7",isQ:true},{f:"y = -(x+3)² + 1",isQ:true},
    {f:"y = 2(x-1)(x+1)",isQ:true},{f:"y = -x² + 4x - 3",isQ:true},
    {f:"y = x² + 5",isQ:true},{f:"y = -4x² + 1",isQ:true},
    {f:"y = 5x - 7",isQ:false},{f:"y = -3x + 2",isQ:false},
    {f:"y = 4/x",isQ:false},{f:"y = -2/x",isQ:false},
    {f:"y = 3x",isQ:false},{f:"y = -x",isQ:false},
    {f:"y = x³ + x²",isQ:false},{f:"y = 2x³ - x",isQ:false},
    {f:"y = x³",isQ:false},{f:"y = x - 4",isQ:false},
    {f:"y = 2x + 3",isQ:false},{f:"y = -x³ + 1",isQ:false},
    {f:"y = 1/x + 2",isQ:false},{f:"y = (x+1)² - x²",isQ:false},
];
let q1Sel=[],isQuadratic=false,lastQ1Correct=false,q1WrongCount=0;

function shuffleQ1(){
    const t=q1Pool.filter(q=>q.isQ).sort(()=>Math.random()-0.5).slice(0,5);
    const f=q1Pool.filter(q=>!q.isQ).sort(()=>Math.random()-0.5).slice(0,5);
    q1Sel=[...t,...f].sort(()=>Math.random()-0.5);
    lastQ1Correct=false;
    q1WrongCount=0;
}

function setupQ1(){
    showTopUI(true);
    el('bg-layer').style.backgroundImage="url('b1.png')";
    el('target').style.display='block';
    el('target').style.backgroundImage="url('a_solo.jpg')";
    el('knight').style.display='block';
    const d=q1Sel[qCount-1]; isQuadratic=d.isQ;
    setTopUI("QUEST 1: 천사(이차함수)의 판별",`${qCount}/10`);
    el('quiz-box').innerText=`이 식은 이차함수(천사)입니까?\n[ ${d.f} ]`;
    el('control-area').innerHTML=`
        <button onclick="judgeQ1(true)">이차함수(천사)이다</button>
        <button onclick="judgeQ1(false)">이차함수가 아니다(몬스터)</button>`;
}

function judgeQ1(choice){
    el('control-area').innerHTML='';
    const ok=(choice===isQuadratic);
    if(ok){
        correctCount++;gd.q1.c++;
        if(isQuadratic){
            showSmall("천사(이차함수)를 제대로 알아보았어요! HP 상승!","#2ecc71");
            el('target').style.backgroundImage="url('a_smile.png')";
            pHP=Math.min(100,pHP+25);
        } else {
            knightAnim('k_attack.jpg',1400);
            showSmall("몬스터(이차함수가 아님)를 제대로 알아보았어요! HP 상승!","#3498db");
            el('target').style.backgroundImage="url('monster_hit.png')";
            pHP=Math.min(100,pHP+25);
        }
    } else {
        isPerfect=false;pHP=Math.max(0,pHP-25);gd.q1.w++;q1WrongCount++;
        if(isQuadratic){
            knightAnim('k_attack.jpg',600);
            setTimeout(()=>knightAnim('k_down.jpg',1000),700);
            showSmall("천사(이차함수)가 맞는데 아니라고 판단! 천사가 화가 났어요! HP 감소!","#e67e22");
            el('target').style.backgroundImage="url('a_angry.jpg')";
        } else {
            knightAnim('k_down.jpg',1400);
            showSmall("몬스터(이차함수가 아님)인데 잘못 판단했어요! HP 감소!","#e74c3c");
            el('target').style.backgroundImage="url('m_solo.png')";
        }
    }
    if(qCount===10) lastQ1Correct=ok;
    updateUI();
    // HP 0 또는 오답 3개 이상 → 즉시 실패
    if(pHP<=0){
        setTimeout(()=>gameOver(),1200);
        return;
    }
    setTimeout(()=>{qCount++;if(qCount>10)finishQ1();else setupQ1();},1800);
}

function finishQ1(){
    // HP > 0이면 무조건 통과 (HP=0은 gameOver()에서 이미 처리)
    showOv("bless.png","QUEST 1 통과!\n⬆ LEVEL UP! ⬆",()=>{
        startQ2();
    });
}

function startQ2(){
    currentQuest=2;qCount=1;currentLevel=2;isPerfect=true;correctCount=0;q2WrongCount=0;shuffleQ2();setupQ2();
}

/* ================================================================
   QUEST 2: y=ax² 그래프 위의 점 찾기 (10문제, 70%+마지막)
   a 값: 유리수 범위, 다양하게
================================================================ */
// y=ax² 형태만. a 값: 정수 및 유리수(분수) 형태
// x가 정수일 때 y도 정수인 a 값만 사용 (클릭 가능한 점 보장)
const q2AValues=[
    {a:1,    disp:'1'},
    {a:-1,   disp:'-1'},
    {a:2,    disp:'2'},
    {a:-2,   disp:'-2'},
    {a:3,    disp:'3'},
    {a:-3,   disp:'-3'},
    {a:4,    disp:'4'},
    {a:-4,   disp:'-4'},
    {a:0.5,  disp:'(1/2)'},
    {a:-0.5, disp:'-(1/2)'},
    {a:0.25, disp:'(1/4)'},
    {a:-0.25,disp:'-(1/4)'},
];
let q2Sel=[],lastQ2Correct=false,q2WrongCount=0;

function shuffleQ2(){
    q2Sel=q2AValues.slice().sort(()=>Math.random()-0.5).slice(0,10);
    lastQ2Correct=false;
    q2WrongCount=0;
}

// Q2 전용 좌표계 상수 (좌표가 더 넓게 보이도록)
// 화면: 1000×750, 하단 패널 185px → 실제 그래프 영역 565px
// 중심을 아래쪽으로(CY2=280), 단위를 50px으로 축소
const Q2_CX=500, Q2_CY=280, Q2_UNIT=50;

function setupQ2(){
    showTopUI(true);
    el('q3-overlay').style.display='none';
    el('bg-layer').style.backgroundImage="url('b2.png')";
    el('target').style.display='none';
    el('knight').style.display='block';
    el('grid-layer').style.display='block';
    el('graph-layer').style.display='block';
    ctx('graph-layer').clearRect(0,0,1000,750);
    selectedDots=0;wrongInStage=0;cleanDots();
    drawGridQ2();

    const item=q2Sel[qCount-1];
    const a=item.a;
    currentFunc={a:a,p:0,q:0};

    // 수식 표시
    const aStr=item.disp;
    let formula;
    if(aStr==='1') formula=`y = x²`;
    else if(aStr==='-1') formula=`y = -x²`;
    else formula=`y = ${aStr}x²`;

    setTopUI("QUEST 2: y=ax² 그래프 위의 점 찾기",`${qCount}/10`);
    el('quiz-box').innerText=`${formula}\n그래프 위의 점 3개를 클릭하세요!`;
    el('control-area').innerHTML='';

    // ★ 그래프는 처음에 그리지 않음 — 3개 정답 클릭 후에만 표시

    // 그래프 위 정수 점 수집
    // y=ax²에서 x가 정수일 때 y가 정수(또는 정수에 매우 근접)인 경우
    const Q2_YMAX=6;
    const usedSet=new Set();
    const validOnGraph=[];

    // (0,0)은 항상 그래프 위
    validOnGraph.push({x:0,y:0});
    usedSet.add('0,0');

    for(let x=-9;x<=9;x++){
        if(x===0) continue;
        const y=a*x*x;
        const yRound=Math.round(y*10000)/10000;
        const yInt=Math.round(yRound);
        if(Math.abs(yRound-yInt)<0.01 && yInt>=-Q2_YMAX && yInt<=Q2_YMAX){
            const k=`${x},${yInt}`;
            if(!usedSet.has(k)){usedSet.add(k);validOnGraph.push({x,y:yInt});}
        }
    }

    // 그래프 위 점 배치 (화면 내) — sy>=70으로 y=4(sy=80)까지 허용
    validOnGraph.forEach(({x,y})=>{
        const sx=Q2_CX+x*Q2_UNIT;
        const sy=Q2_CY-y*Q2_UNIT;
        if(sx>=15&&sx<=985&&sy>=70&&sy<=570) mkDot(x,y,true,a);
    });

    // 오답 점 배치 — y를 -4~5 범위로 확장
    for(let x=-8;x<=8;x++){
        for(let y=-4;y<=5;y++){
            if(usedSet.has(`${x},${y}`)) continue;
            if(Math.random()>0.50) continue;
            const sx=Q2_CX+x*Q2_UNIT;
            const sy=Q2_CY-y*Q2_UNIT;
            if(sx>=15&&sx<=985&&sy>=70&&sy<=570) mkDot(x,y,false,a);
        }
    }
}

function drawGridQ2(){
    const c=ctx('grid-layer');
    c.clearRect(0,0,1000,750);
    const maxX=9, maxY=6;

    // 보조 격자선
    c.lineWidth=0.8;c.strokeStyle='rgba(255,255,255,0.14)';
    for(let i=-maxX;i<=maxX;i++){
        const x=Q2_CX+i*Q2_UNIT;
        c.beginPath();c.moveTo(x,5);c.lineTo(x,590);c.stroke();
    }
    for(let j=-maxY;j<=maxY;j++){
        const y=Q2_CY-j*Q2_UNIT;
        c.beginPath();c.moveTo(5,y);c.lineTo(995,y);c.stroke();
    }

    // x축, y축
    c.strokeStyle='#f1c40f';c.lineWidth=2.5;
    c.beginPath();c.moveTo(5,Q2_CY);c.lineTo(990,Q2_CY);c.stroke();
    c.beginPath();c.moveTo(Q2_CX,5);c.lineTo(Q2_CX,590);c.stroke();

    // 화살표
    c.fillStyle='#f1c40f';
    c.beginPath();c.moveTo(994,Q2_CY);c.lineTo(980,Q2_CY-7);c.lineTo(980,Q2_CY+7);c.fill();
    c.beginPath();c.moveTo(Q2_CX,3);c.lineTo(Q2_CX-7,17);c.lineTo(Q2_CX+7,17);c.fill();

    // ── x축 눈금 & 숫자 ──
    c.textBaseline='top';c.textAlign='center';
    for(let i=-maxX;i<=maxX;i++){
        if(i===0) continue;
        const x=Q2_CX+i*Q2_UNIT;
        if(x<15||x>985) continue;
        // 눈금 선
        c.strokeStyle='rgba(255,255,255,0.45)';c.lineWidth=1;
        c.beginPath();c.moveTo(x,Q2_CY-5);c.lineTo(x,Q2_CY+5);c.stroke();
        // 숫자 (모든 정수)
        c.fillStyle='#ffffff';
        c.font='bold 14px Arial';
        c.fillText(String(i), x, Q2_CY+8);
    }

    // ── y축 눈금 & 숫자 ──
    c.textBaseline='middle';c.textAlign='right';
    for(let j=-maxY;j<=maxY;j++){
        if(j===0) continue;
        const y=Q2_CY-j*Q2_UNIT;
        if(y<10||y>585) continue;
        // 눈금 선
        c.strokeStyle='rgba(255,255,255,0.45)';c.lineWidth=1;
        c.beginPath();c.moveTo(Q2_CX-5,y);c.lineTo(Q2_CX+5,y);c.stroke();
        // 숫자
        c.fillStyle='#ffffff';
        c.font='bold 14px Arial';
        c.fillText(String(j), Q2_CX-8, y);
    }

    // 원점 O
    c.textBaseline='top';c.textAlign='right';
    c.fillStyle='#dddddd';c.font='bold 14px Arial';
    c.fillText('O', Q2_CX-5, Q2_CY+6);

    // 축 라벨 x, y
    c.font='bold 16px Arial';c.fillStyle='#f1c40f';
    c.textAlign='left';c.textBaseline='middle';
    c.fillText('x', 984, Q2_CY-2);
    c.textAlign='center';c.textBaseline='top';
    c.fillText('y', Q2_CX, 6);
}

function drawParabolaQ2(a, color, lw){
    const c=ctx('graph-layer');
    c.strokeStyle=color;c.lineWidth=lw;
    c.shadowColor=color;c.shadowBlur=8;
    c.beginPath();
    let first=true;
    for(let x=-10;x<=10;x+=0.05){
        const y=a*x*x;
        const sx=Q2_CX+x*Q2_UNIT;
        const sy=Q2_CY-y*Q2_UNIT;
        if(sy<0||sy>600||sx<0||sx>1000){first=true;continue;}
        first?c.moveTo(sx,sy):c.lineTo(sx,sy);
        first=false;
    }
    c.stroke();c.shadowBlur=0;
}

function mkDot(gx,gy,isCorrect,aVal){
    const dot=document.createElement('div');
    dot.className='grid-dot';
    dot.style.left=(Q2_CX+gx*Q2_UNIT)+'px';
    dot.style.top=(Q2_CY-gy*Q2_UNIT)+'px';
    dot.title=`(${gx}, ${gy})`;
    dot.onclick=function(){
        this.onclick=null;
        if(isCorrect){
            this.style.background='#2ecc71';
            this.style.borderColor='#27ae60';
            selectedDots++;
            const lbl=document.createElement('div');
            lbl.style.cssText='position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;color:#2ecc71;font-weight:bold;white-space:nowrap;text-shadow:1px 1px 3px #000;pointer-events:none;z-index:65;';
            lbl.innerText=`(${gx},${gy})`;
            this.appendChild(lbl);
            if(selectedDots===3){
                drawParabolaQ2(aVal,'#f1c40f',7);
                correctCount++;gd.q2.c++;pHP=Math.min(100,pHP+25);
                if(qCount===10)lastQ2Correct=true;
                updateUI();
                const wayImg=aVal>0?'way_up.png':'way_down.png';
                const wayMsg=aVal>0?'길이 열렸습니다! (아래로 볼록 그래프)':'길이 열렸습니다! (위로 볼록 그래프)';
                setTimeout(()=>{
                    cleanDots();ctx('graph-layer').clearRect(0,0,1000,750);
                    showOv(wayImg,wayMsg,()=>{
                        qCount++;if(qCount>10)finishQ2();else setupQ2();
                    });
                },800);
            }
        } else {
            this.style.background='rgba(231,76,60,0.8)';
            this.style.borderColor='#e74c3c';
            wrongInStage++;gd.q2.w++;q2WrongCount++;
            pHP=Math.max(0,pHP-25);updateUI();

            // HP 0 → 즉시 게임오버 (Q2 전용: b2 이미지)
            if(pHP<=0){
                isPerfect=false;
                cleanDots();ctx('graph-layer').clearRect(0,0,1000,750);
                showOv("b2.png","전사하였습니다..\n여기까지의 결과를 확인해보세요.",()=>{showFeedback();});
                return;
            }
            if(wrongInStage===1){
                // 첫 번째 오답: 힌트 표시, 같은 문제 계속
                const aStr=q2Sel[qCount-1].disp;
                showSmall(`💡 y=${aStr==='1'?'':aStr==='-1'?'-':aStr}x²에 x를 대입해 y를 계산해보세요!`,"#f39c12");
            } else {
                // 두 번째 오답: threat1/2 이미지 + 다음 문제
                isPerfect=false;
                const threatImg=Math.random()<0.5?'threat1.png':'threat2.png';
                cleanDots();ctx('graph-layer').clearRect(0,0,1000,750);
                showOv(threatImg,
                    "길을 잘못 찾아 위험에 빠졌습니다!\n다음 구간으로 이동합니다...",
                    ()=>{qCount++;if(qCount>10)finishQ2();else setupQ2();}
                );
            }
        }
    };
    document.getElementById('game-container').appendChild(dot);
}

// 힌트용: 예시 정답 점 3개 문자열
function getExamplePoints(a){
    const pts=[];
    for(let x=-6;x<=6&&pts.length<3;x++){
        if(x===0&&pts.length===0){pts.push(`(0,0)`);continue;}
        if(x===0) continue;
        const y=a*x*x;
        const yi=Math.round(y*1000)/1000;
        const yint=Math.round(yi);
        if(Math.abs(yi-yint)<0.001&&Math.abs(yint)<=5) pts.push(`(${x},${yint})`);
    }
    if(pts.length===0) pts.push('(0,0)');
    return pts.slice(0,3).join(', ');
}

/* ================================================================
   QUEST 3 (구 Q2.5): 비밀의 숲 — 3문제
   문제1: a 순서 맞추기 (4개 그래프)
   문제2: 식↔그래프 짝짓기 (4쌍)
   문제3: 추가 짝짓기 (4쌍, 다른 구성)
================================================================ */

// ─── Q3 문제 풀 (랜덤) ────────────────────────────────────────────────────
// a 후보 (다양한 유리수)
const q3APool=[
    {a:4,    text:'y = 4x²'},   {a:-4,   text:'y = -4x²'},
    {a:3,    text:'y = 3x²'},   {a:-3,   text:'y = -3x²'},
    {a:2,    text:'y = 2x²'},   {a:-2,   text:'y = -2x²'},
    {a:1.5,  text:'y = (3/2)x²'},{a:-1.5,text:'y = -(3/2)x²'},
    {a:1,    text:'y = x²'},    {a:-1,   text:'y = -x²'},
    {a:0.5,  text:'y = (1/2)x²'},{a:-0.5,text:'y = -(1/2)x²'},
    {a:0.25, text:'y = (1/4)x²'},{a:-0.25,text:'y = -(1/4)x²'},
    {a:1/3,  text:'y = (1/3)x²'},{a:-1/3,text:'y = -(1/3)x²'},
    {a:0.75, text:'y = (3/4)x²'},{a:-0.75,text:'y = -(3/4)x²'},
    {a:5,    text:'y = 5x²'},   {a:-5,   text:'y = -5x²'},
];

let q3OvQ1=null,q3OvQ2=null,q3OvQ3=null,q3OvQ4=null,q3OvQ5=null;
const q3Labels1=['ㄱ','ㄴ','ㄷ','ㄹ'];
const q3Labels4=['ㄱ','ㄴ','ㄷ','ㄹ']; // 문제4 (순서형)
const q3Labels2=['(1)','(2)','(3)','(4)'];
const q3Labels3=['(가)','(나)','(다)','(라)'];
const q3Labels5=['(A)','(B)','(C)','(D)']; // 문제5 (짝짓기)
const q3GLabels2=['A','B','C','D'];
const q3GLabels3=['가','나','다','라'];
const q3GLabels5=['①','②','③','④'];

// 양수/음수 비율: [2,2]가 절반 이상 나오도록 가중치 ([2,2],[2,2],[1,3],[3,1])
function pickMix(posPool,negPool){
    const mixes=[[2,2],[2,2],[1,3],[3,1]];
    const [np,nn]=mixes[Math.floor(Math.random()*4)];
    const pos=[...posPool].sort(()=>Math.random()-0.5).slice(0,np);
    const neg=[...negPool].sort(()=>Math.random()-0.5).slice(0,nn);
    // 부족하면 전체에서 보충
    while(pos.length<np)pos.push(q3APool.filter(p=>p.a>0).sort(()=>Math.random()-0.5)[0]);
    while(neg.length<nn)neg.push(q3APool.filter(p=>p.a<0).sort(()=>Math.random()-0.5)[0]);
    return [...pos,...neg].sort(()=>Math.random()-0.5);
}

// 짝짓기 문제 생성 헬퍼
function makeMatchQ(pool,fLabels,gLabels){
    const formulas=pool.map((p,i)=>({label:fLabels[i],text:p.text,a:p.a}));
    const shuffledG=[...pool].sort(()=>Math.random()-0.5).map((p,i)=>({label:gLabels[i],a:p.a}));
    const ans={};
    formulas.forEach((f,fi)=>{
        const gi=shuffledG.findIndex(g=>Math.abs(g.a-f.a)<0.0001);
        ans[fi]=shuffledG[gi].label;
    });
    return {formulas,graphs:shuffledG,answer:ans};
}

// 순서 맞추기 문제 생성 헬퍼 (a 내림차순)
function makeOrderQ(pool,labels){
    const graphs=pool.map((p,i)=>({label:labels[i],a:p.a}));
    const sorted=[...graphs].sort((a,b)=>b.a-a.a);
    return {graphs, answer:sorted.map(g=>g.label)};
}

function buildQ3Problems(){
    const posAll=q3APool.filter(p=>p.a>0);
    const negAll=q3APool.filter(p=>p.a<0);
    const used=new Set();

    function freshPick(posPool,negPool){
        const avPos=posPool.filter(p=>!used.has(p.a));
        const avNeg=negPool.filter(p=>!used.has(p.a));
        // 부족하면 이미 쓴 것도 허용
        const pPool=avPos.length>=3?avPos:posPool;
        const nPool=avNeg.length>=3?avNeg:negPool;
        const pool=pickMix(pPool,nPool);
        pool.forEach(p=>used.add(p.a));
        return pool;
    }

    // 문제1: 순서형 (a 내림차순)
    const p1=freshPick(posAll,negAll);
    q3OvQ1=makeOrderQ(p1,q3Labels1);

    // 문제2: 짝짓기
    const p2=freshPick(posAll,negAll);
    q3OvQ2=makeMatchQ(p2,q3Labels2,q3GLabels2);

    // 문제3: 짝짓기
    const p3=freshPick(posAll,negAll);
    q3OvQ3=makeMatchQ(p3,q3Labels3,q3GLabels3);

    // 문제4: 순서형 (a 내림차순)
    const p4=freshPick(posAll,negAll);
    q3OvQ4=makeOrderQ(p4,q3Labels4);

    // 문제5: 짝짓기
    const p5=freshPick(posAll,negAll);
    q3OvQ5=makeMatchQ(p5,q3Labels5,q3GLabels5);
}

let q3OvStep=1,q3OvSel=[],q3OvMatches={},q3OvActiveF=null;
let q3OvCorrect=0;
let q3QWrong=0; // 현재 문제 오답 횟수 (문제 바뀔 때 초기화)

            q3OvMatches[q3OvActiveF]=g.label;
            const arrEl=document.getElementById('q3fi_arr_'+q3OvActiveF);
            if(arrEl){arrEl.innerText='→ '+g.label;arrEl.style.color='#2ecc71';}

                if(!e.classList.contains('q3fi-matched'))e.className='q3fi';

        };

// ─── Q3 공통: 정답/오답 처리 ──────────────────────────────────────────────
function q3Correct(nextFn){
    q3OvCorrect++;gd.q3.c++;
    pHP=Math.min(100,pHP+25);updateUI(); // HP 25 회복
    el('q3-hint-msg').style.color='#2ecc71';
    el('q3-hint-msg').innerText='✔ 정답! HP 회복!';
    q3QWrong=0;
    setTimeout(()=>nextFn(),1600);
}

function q3Wrong(retryFn,nextFn,hint){
    q3QWrong++;gd.q3.w++;
    pHP=Math.max(0,pHP-25);updateUI(); // HP 25 감소
    if(pHP<=0){
        el('q3-overlay').style.display='none';
        showOv("m_secret1.png","전사하였습니다..\n여기까지의 결과를 확인해보세요.",()=>{showFeedback();});
        return;
    }
    if(q3QWrong===1){
        el('q3-hint-msg').style.color='#f39c12';
        el('q3-hint-msg').innerText='💡 '+hint+' HP -20!';
        setTimeout(()=>retryFn(),2500);
    } else {
        el('q3-hint-msg').style.color='#e74c3c';
        el('q3-hint-msg').innerText='✘ 2회 오답. 다음 문제로 이동합니다.';
        q3QWrong=0;
        setTimeout(()=>nextFn(),2000);
    }
}

// 순서형 채점
function checkOrderQ(qData,nextFn){
    if(q3OvSel.length<4){showSmall("4개를 모두 선택하세요!","yellow");return;}
    const ok=qData.answer.every((v,i)=>v===q3OvSel[i]);
    if(ok){
        q3Correct(nextFn);
    } else {
        q3Wrong(
            ()=>{q3OvSel=[];qData.graphs.forEach(g=>{const b=el('q3ov_gb_'+g.label);if(b)b.classList.remove('selected');const bd=el('q3ov_badge_'+g.label);if(bd)bd.innerText='';});},
            nextFn,
            'a>0:아래볼록, a<0:위볼록. |a|클수록 폭 좁음. 가장 큰 a부터!'
        );
    }
}

// 짝짓기 채점
function checkMatchQ(qData,retryFn,nextFn){
    if(Object.keys(q3OvMatches).length<4){showSmall("4쌍을 모두 연결하세요!","yellow");return;}
    let ok=true;
    for(let i=0;i<4;i++)if(q3OvMatches[i]!==qData.answer[i]){ok=false;break;}
    if(ok){
        q3Correct(nextFn);
    } else {
        q3Wrong(
            ()=>{q3OvMatches={};q3OvActiveF=null;retryFn();},
            nextFn,
            'a>0:아래볼록(U자), a<0:위볼록(∩자). |a|클수록 폭 좁음!'
        );
    }
}

function submitQ3Ov(){
    const step=q3OvStep;
    if(step===1){
        // 문제1: 순서형
        checkOrderQ(q3OvQ1,()=>{q3QWrong=0;q3OvStep=2;setupQ3OvStep4_as2();});
    } else if(step===2){
        // 문제2: 순서형 (구 4번)
        checkOrderQ(q3OvQ4,()=>{q3QWrong=0;q3OvStep=3;setupQ3OvMatch(3,q3OvQ3);});
    } else if(step===3){
        // 문제3: 짝짓기
        checkMatchQ(q3OvQ3,()=>setupQ3OvMatch(3,q3OvQ3),()=>{q3QWrong=0;q3OvStep=4;setupQ3OvMatch(4,q3OvQ2);});
    } else if(step===4){
        // 문제4: 짝짓기 (구 2번)
        checkMatchQ(q3OvQ2,()=>setupQ3OvMatch(4,q3OvQ2),()=>{q3QWrong=0;q3OvStep=5;setupQ3OvMatch(5,q3OvQ5);});
    } else {
        // 문제5: 짝짓기
        checkMatchQ(q3OvQ5,()=>setupQ3OvMatch(5,q3OvQ5),()=>finishQ3Ov());
    }
}

function finishQ3Ov(){
    el('q3-overlay').style.display='none';
    // HP > 0이면 통과 (HP가 0이 되면 q3Wrong()에서 이미 처리)
    if(pHP>0){

                el('overlay-msg').style.fontSize='44px';

                el('overlay-msg').style.bottom='auto';

function showFeedback(){
    el('feedback-screen').style.display='block';
    const areas=[
        {
            key:'q1', name:"이차함수 판별 (QUEST 1)",
            c:gd.q1.c, w:gd.q1.w,
            desc:"y=ax²+bx+c 꼴(a≠0)인지 판별하는 문제입니다.\nx의 최고차항이 2차인지, a가 0이 아닌지 확인하세요.",
            retry:()=>{
                el('feedback-screen').style.display='none';
                currentQuest=1;qCount=1;correctCount=0;isPerfect=true;pHP=100;
                showTopUI(true);el('knight').style.display='block';el('target').style.display='block';
                el('bg-layer').style.backgroundImage="url('b1.png')";
                el('grid-layer').style.display='block';el('graph-layer').style.display='block';
                updateUI();shuffleQ1();setupQ1();
            }
        },
        {
            key:'q2', name:"y=ax² 그래프 위의 점 찾기 (QUEST 2)",
            c:gd.q2.c, w:gd.q2.w,
            desc:"x값을 y=ax²에 대입해 y값을 계산하는 문제입니다.\na의 부호(양수↔볼록 방향)와 크기(그래프 폭)를 이해하세요.",
            retry:()=>{el('feedback-screen').style.display='none';startQ2();}
        },
        {
            key:'q3', name:"그래프 보고 함수식 찾기 (QUEST 3)",
            c:gd.q3.c, w:gd.q3.w,
            desc:"y=ax²에서 a의 크기와 부호로 그래프 모양이 결정됩니다.\na>0이면 아래로 볼록, a<0이면 위로 볼록.\n|a|가 클수록 폭이 좁아집니다.",
            retry:()=>{el('feedback-screen').style.display='none';startQ3Ov();}
        },
    ];

    const tot=areas.reduce((s,a)=>s+a.c+a.w,0);
    const totC=areas.reduce((s,a)=>s+a.c,0);
    const acc=tot>0?Math.round(totC/tot*100):0;
    function bc(r){return r>=0.7?'#2ecc71':r>=0.5?'#f1c40f':'#e74c3c';}

    let barsH=areas.map(a=>{
        const t=a.c+a.w;if(!t)return'';
        const r=a.c/t,p=Math.round(r*100),c=bc(r);
        return`<div class="fb-row">
            <span style="min-width:220px;font-size:12px;color:#ccc">${a.name}</span>
            <div class="fb-bar-bg"><div class="fb-bar-fill" style="width:${p}%;background:${c}"></div></div>
            <span style="min-width:44px;text-align:right;color:${c};font-weight:bold">${p}%</span>
            <span style="color:#888;font-size:11px">(${a.c}/${t})</span>
        </div>`;
    }).join('');

    // 부족한 부분: 70% 미만
    const badAreas=areas.filter(a=>(a.c+a.w)>0&&a.c/(a.c+a.w)<0.7);
    let badH='';
    if(badAreas.length>0){
        badH=badAreas.map((a,i)=>{
            const t=a.c+a.w,r=a.c/t,p=Math.round(r*100),c=bc(r);
            const label=r>=0.5?'📌 조금 더 노력':'🔥 집중 보완';
            return`<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 12px;margin-bottom:8px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
                    <span style="color:${c};font-weight:bold;font-size:13px;">${label}: ${a.name} (${p}%)</span>
                    <button id="retry_${i}" style="padding:5px 14px;font-size:12px;cursor:pointer;border-radius:6px;border:1px solid ${c};background:rgba(0,0,0,0.6);color:${c};font-weight:bold;">🔄 다시 도전</button>
                </div>
                <div style="color:#ccc;font-size:12px;line-height:1.7;white-space:pre-line;">${a.desc}</div>
            </div>`;
        }).join('');
    } else {
        badH='<div style="color:#2ecc71;font-size:13px;padding:8px 0;">🎉 모든 영역을 훌륭하게 수행했습니다!</div>';
    }

    const good=areas.filter(a=>(a.c+a.w)>0&&a.c/(a.c+a.w)>=0.7);
    const goodT=good.map(a=>`<span class="fb-tag fb-good">✔ ${a.name}</span>`).join('')
                ||'<span style="color:#888;font-size:12px">해당 없음</span>';

    let comm='';
    if(acc>=85)comm='🏆 훌륭합니다! 이차함수의 핵심 개념을 잘 이해하고 있어요!';
    else if(acc>=70)comm='👍 좋은 성과! 부족한 부분을 한 번 더 복습해봐요.';
    else if(acc>=50)comm='📚 기초부터 차근차근 복습해보세요.';
    else comm='💪 아래 재도전 버튼을 눌러 다시 연습해봐요!';

    el('fb-content').innerHTML=`
        <div class="fb-section">
            <div class="fb-section-title" style="color:#f1c40f">🎯 전체 성적</div>
            <div style="text-align:center;font-size:42px;font-weight:900;color:${acc>=70?'#2ecc71':acc>=50?'#f1c40f':'#e74c3c'}">${acc}점</div>
            <div style="text-align:center;color:#aaa;font-size:12px;margin-top:4px">총 ${totC} / ${tot} 정답</div>
            <div class="fb-comment" style="margin-top:8px">${comm}</div>
        </div>
        <div class="fb-section">
            <div class="fb-section-title" style="color:#4fc3f7">📈 영역별 정확도</div>
            ${barsH}
        </div>
        <div class="fb-section">
            <div class="fb-section-title" style="color:#2ecc71">💪 잘하는 부분</div>
            <div style="margin-bottom:4px">${goodT}</div>
        </div>
        <div class="fb-section">
            <div class="fb-section-title" style="color:#e74c3c;margin-bottom:10px">🔥 부족한 부분 & 재도전</div>
            ${badH}
        </div>`;

    badAreas.forEach((a,i)=>{
        const btn=document.getElementById('retry_'+i);
        if(btn)btn.onclick=a.retry;
    });

    setTimeout(()=>{
        document.querySelectorAll('.fb-bar-fill').forEach(e=>{
            const w=e.style.width;e.style.width='0';setTimeout(()=>e.style.width=w,50);
        });
    },100);
}

        ov.style.backgroundColor='';
        ov.style.display='none';
        el('overlay-msg').style.display='none';
        if(cb)cb();
    },d);
}

function cleanDots(){document.querySelectorAll('.grid-dot').forEach(d=>d.remove());}

function drawGrid(){
    const c=ctx('grid-layer');c.clearRect(0,0,1000,750);
    c.strokeStyle='rgba(255,255,255,0.25)';c.fillStyle='#fff';c.font='bold 17px Arial';
    for(let i=-8;i<=8;i++){
        c.beginPath();c.moveTo(CX+i*UNIT,0);c.lineTo(CX+i*UNIT,750);c.stroke();
        c.beginPath();c.moveTo(0,CY-i*UNIT);c.lineTo(1000,CY-i*UNIT);c.stroke();
        if(i!==0){c.fillText(i,CX+i*UNIT-8,CY+24);c.fillText(i,CX-32,CY-i*UNIT+6);}
    }
    c.strokeStyle='#f1c40f';c.lineWidth=3;
    c.beginPath();c.moveTo(0,CY);c.lineTo(1000,CY);c.stroke();
    c.beginPath();c.moveTo(CX,0);c.lineTo(CX,750);c.stroke();
    c.fillText('0',CX-18,CY+24);
}

function drawParabola(){
    const c=ctx('graph-layer');c.strokeStyle='#f1c40f';c.lineWidth=8;c.beginPath();
    const{a,p,q}=currentFunc;
    for(let x=-7;x<=7;x+=0.1){
        const sx=CX+x*UNIT,sy=CY-(a*Math.pow(x-p,2)+q)*UNIT;
        x===-7?c.moveTo(sx,sy):c.lineTo(sx,sy);
    }
    c.stroke();
}

// 하나의 캔버스에 여러 포물선 그리기
function drawCombinedParabolas(canvas,graphs,colors){
    const c=canvas.getContext('2d');
    const w=canvas.width,h=canvas.height;
    c.clearRect(0,0,w,h);
    c.fillStyle='rgba(10,5,25,1)';c.fillRect(0,0,w,h);
    const cx=w/2,cy=h*0.45,scX=w/16,scY=h/22;
    c.strokeStyle='rgba(255,255,255,0.15)';c.lineWidth=0.7;
    for(let i=-8;i<=8;i++){c.beginPath();c.moveTo(cx+i*scX,0);c.lineTo(cx+i*scX,h);c.stroke();}
    for(let j=-5;j<=6;j++){c.beginPath();c.moveTo(0,cy-j*scY);c.lineTo(w,cy-j*scY);c.stroke();}
    c.strokeStyle='#f1c40f';c.lineWidth=1.8;
    c.beginPath();c.moveTo(0,cy);c.lineTo(w,cy);c.stroke();
    c.beginPath();c.moveTo(cx,0);c.lineTo(cx,h);c.stroke();
    c.fillStyle='#f1c40f';c.font='bold 11px Arial';
    c.fillText('x',w-10,cy-4);c.fillText('y',cx+4,10);
    c.fillStyle='rgba(255,255,255,0.5)';c.font='9px Arial';
    for(let i=-6;i<=6;i+=2)if(i!==0)c.fillText(i,cx+i*scX-5,cy+12);
    graphs.forEach((g,idx)=>{
        c.strokeStyle=colors[idx];c.lineWidth=2.5;c.shadowColor=colors[idx];c.shadowBlur=6;
        c.beginPath();let first=true;
        for(let x=-8;x<=8;x+=0.07){
            const y=g.a*x*x,sx=cx+x*scX,sy=cy-y*scY;
            if(sy<-5||sy>h+5){first=true;continue;}
            first?c.moveTo(sx,sy):c.lineTo(sx,sy);first=false;
        }
        c.stroke();c.shadowBlur=0;
        // 라벨은 버튼으로 표시하므로 캔버스에는 그리지 않음
    });
}

function playOpening(idx){
    if(idx >= openingFrames.length){
        const scr=el('opening-screen');
        scr.style.opacity='0';
        scr.style.transition='opacity 0.6s';
        setTimeout(()=>{
            scr.style.display='none';
            scr.style.opacity='';
            scr.style.transition='';
            // 퀘스트1 시작
            showTopUI(true);
            shuffleQ1();
            setupQ1();
            updateUI();
        },650);
        return;
    }
    const f=openingFrames[idx];
    const scr=el('opening-screen');
    scr.style.display='flex';
    // 페이드인
    scr.style.opacity='0';
    scr.style.transition='opacity 0.5s';
    el('opening-img').src=f.src;
    el('opening-msg').innerText=f.msg;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{scr.style.opacity='1';}));

    // 표시 시간: 5~6초 고정
    const dur=5500;
    setTimeout(()=>{
        // 페이드아웃 후 다음 씬
        scr.style.opacity='0';
        setTimeout(()=>playOpening(idx+1), 550);
    }, dur);
}

<script>
(function scaleGame(){
    function fit(){
        const el=document.getElementById('game-container');
        if(!el)return;
        const W=window.innerWidth, H=window.innerHeight;
        const scaleW=W/1008;   // 1000px + 4px border×2
        const scaleH=H/758;    // 750px + 4px border×2
        const scale=Math.min(scaleW,scaleH);
        el.style.transform='scale('+scale+')';
        // 스케일 후 실제 점유 크기로 body 정렬
        el.style.marginTop=Math.max(0,(H-750*scale)/2)+'px';
    }
    window.addEventListener('resize',fit);
    window.addEventListener('orientationchange',fit);
    document.addEventListener('DOMContentLoaded',fit);
    // 이미 로드된 경우 즉시 실행
    if(document.readyState!=='loading') fit();
})();
</script>
